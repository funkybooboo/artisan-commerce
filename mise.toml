[tools]
node = "20" # Pin to Node.js 20 LTS

[tasks.setup]
description = "Setup development environment (install dependencies)"
run = """
echo "Installing dependencies..."
pnpm install
echo "[OK] Dependencies installed"
echo ""
echo "Next steps:"
echo "  1. Copy .env.example to .env and fill in your values"
echo "  2. Run 'mise run db:setup' to initialize local database"
echo "  3. Run 'mise run dev' to start development servers"
"""

[tasks."db:setup"]
description = "Create and initialize local database"
run = """
echo "Creating local D1 database..."
cd apps/api
npx wrangler d1 create artisan-commerce-local || echo "Database may already exist"
echo ""
echo "Applying migrations..."
npx wrangler d1 migrations apply artisan-commerce-local --local
echo "[OK] Local database initialized"
"""

[tasks."db:generate"]
description = "Generate database migrations"
run = "cd packages/db && pnpm db:generate"

[tasks."db:migrate:local"]
description = "Apply migrations to local database"
run = "cd apps/api && pnpm db:migrate:local"

[tasks."db:migrate:remote"]
description = "Apply migrations to production database"
run = "cd apps/api && pnpm db:migrate:remote"

[tasks."db:studio"]
description = "Open Drizzle Studio (database browser)"
run = "cd packages/db && pnpm db:studio"

[tasks.dev]
description = "Start all development servers"
run = "pnpm run dev"

[tasks.build]
description = "Build the project for production"
run = "pnpm run build"

[tasks.test]
description = "Run all tests"
run = "pnpm run test"

[tasks."test:unit"]
description = "Run unit tests only"
run = "pnpm run test:unit"

[tasks."test:integration"]
description = "Run integration tests only"
run = "pnpm run test:integration"

[tasks."test:e2e"]
description = "Run end-to-end tests"
run = "pnpm run test:e2e"

[tasks.format]
description = "Format code automatically"
run = "pnpm run format"

[tasks."format:check"]
description = "Check if code is properly formatted"
run = "pnpm run format:check"

[tasks.lint]
description = "Run linter"
run = "pnpm run lint"

[tasks."lint:fix"]
description = "Run linter and auto-fix issues"
run = "pnpm run lint:fix"

[tasks."type-check"]
description = "Run type checker"
run = "pnpm run type-check"

[tasks.check]
description = "Run all code quality checks (format, lint, type-check)"
depends = ["format:check", "lint", "type-check"]
run = "echo '[OK] All quality checks passed'"

[tasks.validate]
description = "Run all validation checks (format, lint, type-check, test, build)"
depends = ["format:check", "lint", "type-check", "test", "build"]
run = "echo '[OK] All validation checks passed'"

[tasks.ci]
description = "Run CI pipeline (alias for validate)"
depends = ["validate"]

[tasks.clean]
description = "Clean build artifacts and caches"
run = """
echo "Cleaning build artifacts..."
rm -rf node_modules
rm -rf apps/*/node_modules
rm -rf packages/*/node_modules
rm -rf apps/*/.svelte-kit
rm -rf apps/*/.wrangler
rm -rf apps/*/dist
rm -rf packages/*/dist
echo "[OK] Cleaned"
"""

[tasks.help]
description = "Show detailed help for all tasks"
run = "mise tasks ls"
