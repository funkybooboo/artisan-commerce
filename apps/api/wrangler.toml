name = "artisan-commerce-api"
main = "src/index.ts"
compatibility_date = "2026-03-04"

# Non-secret environment variables (safe to commit)
[vars]
APP_BASE_URL = "http://localhost:8787"
ARTISAN_ALLOWED_REGION = "utah"

# D1 Database binding (local development)
[[d1_databases]]
binding = "DB"
database_name = "artisan-commerce-local"
database_id = "local-db"
migrations_dir = "drizzle/migrations"

# Production environment
[env.production]
[env.production.vars]
APP_BASE_URL = "https://artisan-commerce.com"
ARTISAN_ALLOWED_REGION = "utah"
[[env.production.d1_databases]]
binding = "DB"
database_name = "artisan-commerce-prod"
database_id = "" # To be filled after creating production DB
migrations_dir = "drizzle/migrations"
